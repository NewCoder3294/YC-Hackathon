<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="grid-sm" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#171717" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid-lg" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#grid-sm)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#262626" stroke-width="0.75"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="#0A0A0A"/>
  <rect width="400" height="400" fill="url(#grid-lg)"/>
</svg>
