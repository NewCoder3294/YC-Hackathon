<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="light-1" cx="50%" cy="0%" r="15%">
      <stop offset="0%"  stop-color="#FAFAFA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FAFAFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light-2" cx="20%" cy="0%" r="12%">
      <stop offset="0%"  stop-color="#FAFAFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FAFAFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="light-3" cx="80%" cy="0%" r="12%">
      <stop offset="0%"  stop-color="#FAFAFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FAFAFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#050505"/>
      <stop offset="50%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="field-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#050505" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="500" fill="url(#sky)"/>

  <!-- Light halos (stadium glow) -->
  <rect width="1600" height="500" fill="url(#light-1)"/>
  <rect width="1600" height="500" fill="url(#light-2)"/>
  <rect width="1600" height="500" fill="url(#light-3)"/>

  <!-- Light rigs (top of screen) -->
  <g fill="#1A1A1A" stroke="#262626" stroke-width="0.5">
    <rect x="295" y="40" width="30" height="4"/>
    <circle cx="300" cy="44" r="2" fill="#FAFAFA"/>
    <circle cx="310" cy="44" r="2" fill="#FAFAFA"/>
    <circle cx="320" cy="44" r="2" fill="#FAFAFA"/>
    <line x1="310" y1="44" x2="310" y2="100" stroke="#262626" stroke-width="1"/>

    <rect x="795" y="30" width="30" height="4"/>
    <circle cx="800" cy="34" r="2" fill="#FAFAFA"/>
    <circle cx="810" cy="34" r="2" fill="#FAFAFA"/>
    <circle cx="820" cy="34" r="2" fill="#FAFAFA"/>
    <line x1="810" y1="34" x2="810" y2="100" stroke="#262626" stroke-width="1"/>

    <rect x="1275" y="40" width="30" height="4"/>
    <circle cx="1280" cy="44" r="2" fill="#FAFAFA"/>
    <circle cx="1290" cy="44" r="2" fill="#FAFAFA"/>
    <circle cx="1300" cy="44" r="2" fill="#FAFAFA"/>
    <line x1="1290" y1="44" x2="1290" y2="100" stroke="#262626" stroke-width="1"/>
  </g>

  <!-- Upper deck / stadium bowl silhouette -->
  <path d="M 0 280
           L 0 240
           Q 300 200, 600 210
           Q 900 220, 1200 210
           Q 1400 205, 1600 230
           L 1600 280 Z"
        fill="#0F0F0F"/>

  <!-- Lower deck -->
  <path d="M 0 340
           L 0 300
           Q 400 280, 800 285
           Q 1200 290, 1600 300
           L 1600 340 Z"
        fill="#141414"/>

  <!-- Crowd silhouette dots (subtle) -->
  <g fill="#262626">
    <circle cx="80" cy="270" r="1.5"/>
    <circle cx="160" cy="268" r="1.5"/>
    <circle cx="240" cy="272" r="1.5"/>
    <circle cx="320" cy="270" r="1.5"/>
    <circle cx="400" cy="268" r="1.5"/>
    <circle cx="480" cy="271" r="1.5"/>
    <circle cx="560" cy="270" r="1.5"/>
    <circle cx="640" cy="269" r="1.5"/>
    <circle cx="720" cy="272" r="1.5"/>
    <circle cx="800" cy="270" r="1.5"/>
    <circle cx="880" cy="268" r="1.5"/>
    <circle cx="960" cy="271" r="1.5"/>
    <circle cx="1040" cy="270" r="1.5"/>
    <circle cx="1120" cy="272" r="1.5"/>
    <circle cx="1200" cy="270" r="1.5"/>
    <circle cx="1280" cy="269" r="1.5"/>
    <circle cx="1360" cy="271" r="1.5"/>
    <circle cx="1440" cy="270" r="1.5"/>
    <circle cx="1520" cy="272" r="1.5"/>

    <circle cx="120" cy="325" r="1.5"/>
    <circle cx="220" cy="323" r="1.5"/>
    <circle cx="340" cy="326" r="1.5"/>
    <circle cx="460" cy="324" r="1.5"/>
    <circle cx="580" cy="325" r="1.5"/>
    <circle cx="700" cy="323" r="1.5"/>
    <circle cx="820" cy="326" r="1.5"/>
    <circle cx="940" cy="324" r="1.5"/>
    <circle cx="1060" cy="325" r="1.5"/>
    <circle cx="1180" cy="323" r="1.5"/>
    <circle cx="1300" cy="326" r="1.5"/>
    <circle cx="1420" cy="324" r="1.5"/>
  </g>

  <!-- Field/horizon line -->
  <rect x="0" y="340" width="1600" height="160" fill="#0F1A10"/>
  <line x1="0" y1="340" x2="1600" y2="340" stroke="#1F2F1F"/>
  <!-- Subtle field pattern lines -->
  <g stroke="#1A2A1A" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="360" x2="1600" y2="360"/>
    <line x1="0" y1="390" x2="1600" y2="390"/>
    <line x1="0" y1="430" x2="1600" y2="430"/>
    <line x1="0" y1="480" x2="1600" y2="480"/>
  </g>

  <!-- Atmospheric fade -->
  <rect width="1600" height="500" fill="url(#field-fade)"/>
</svg>
