const FRAME_SCALE = 0.58;
const SCALED_W = IPAD.W * FRAME_SCALE;
const SCALED_H = IPAD.H * FRAME_SCALE;

function FrameCard({ label, subtitle, notes = [], quote, who, children, width }) {
  return (
    <div style={{ position: 'relative', flexShrink: 0, width: width || 'auto' }}>
      <div style={{
        position: 'absolute', bottom: 'calc(100% + 8px)', left: 0,
        display: 'flex', alignItems: 'baseline', gap: 10, whiteSpace: 'nowrap',
      }}>
        <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.22em', color: 'rgba(60,50,40,0.9)' }}>{label}</span>
        <span style={{ fontSize: 11, color: 'rgba(60,50,40,0.55)', letterSpacing: '0.08em' }}>{subtitle}</span>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div>{children}</div>
        <div style={{
          maxWidth: 560,
          background: '#fff',
          border: '1px solid rgba(60,50,40,0.12)',
          borderRadius: 8,
          padding: '14px 16px',
          fontFamily: "'IBM Plex Mono', ui-monospace, monospace",
          fontSize: 11, lineHeight: 1.5, color: '#1a1614',
        }}>
          {notes.map((n, i) => (
            <div key={i} style={{ display: 'grid', gridTemplateColumns: '90px 1fr', gap: 10, padding: '4px 0', borderTop: i === 0 ? 'none' : '1px solid rgba(60,50,40,0.08)' }}>
              <span style={{ fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'rgba(60,50,40,0.6)' }}>{n.k}</span>
              <span style={{ color: 'rgba(30,25,20,0.85)' }}>{n.v}</span>
            </div>
          ))}
          {quote && (
            <div style={{ marginTop: 10, padding: '10px 12px', background: 'rgba(250,245,235,0.6)', borderLeft: '3px solid #EF4444' }}>
              <div style={{ fontStyle: 'italic', color: 'rgba(30,25,20,0.9)', lineHeight: 1.45 }}>"{quote}"</div>
              <div style={{ marginTop: 6, fontSize: 10, letterSpacing: '0.14em', color: 'rgba(60,50,40,0.55)' }}>— {who}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function ScaledFrame({ children, hero = false }) {
  const s = hero ? 0.78 : FRAME_SCALE;
  return (
    <div style={{
      width: IPAD.W * s,
      height: IPAD.H * s,
      overflow: 'hidden',
      boxShadow: '0 2px 8px rgba(0,0,0,0.12), 0 16px 40px rgba(0,0,0,0.22)',
      borderRadius: 14,
      background: '#000',
    }}>
      <div style={{ transform: `scale(${s})`, transformOrigin: 'top left' }}>
        {children}
      </div>
    </div>
  );
}
