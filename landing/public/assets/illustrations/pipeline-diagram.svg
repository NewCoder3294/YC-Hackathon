<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <style>
    .flow { stroke-dasharray: 4 8; animation: flow 1.5s linear infinite; }
    @keyframes flow { to { stroke-dashoffset: -24; } }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#525252"/>
    </marker>
  </defs>

  <!-- Node: Audio -->
  <g transform="translate(30 160)">
    <rect width="130" height="80" rx="8" fill="#0A0A0A" stroke="#262626"/>
    <g transform="translate(16 20)" stroke="#737373" stroke-width="1.25" fill="none" stroke-linecap="round">
      <rect x="3" y="0" width="8" height="12" rx="4"/>
      <path d="M0 8v1a7 7 0 0 0 14 0V8"/>
    </g>
    <text x="42" y="28" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="-0.01em">Broadcast</text>
    <text x="42" y="42" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="-0.01em">Audio</text>
    <text x="16" y="66" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="8" fill="#525252" letter-spacing="0.1em">LIVE STREAM</text>
  </g>

  <!-- Node: Whisper STT -->
  <g transform="translate(200 160)">
    <rect width="130" height="80" rx="8" fill="#0A0A0A" stroke="#262626"/>
    <rect x="16" y="18" width="22" height="14" rx="3" fill="#141414" stroke="#8B5CF6" stroke-width="0.75"/>
    <text x="27" y="28" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="7" font-weight="700" fill="#8B5CF6" text-anchor="middle">STT</text>
    <text x="46" y="28" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="-0.01em">Whisper</text>
    <text x="46" y="42" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#A3A3A3">on-device</text>
    <text x="16" y="66" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="8" fill="#525252" letter-spacing="0.1em">~100MS</text>
  </g>

  <!-- Node: Gemma 4 (central) -->
  <g transform="translate(370 140)">
    <rect width="160" height="120" rx="8" fill="#0A0A0A" stroke="#EF4444" stroke-opacity="0.3" stroke-width="1.25"/>
    <rect x="16" y="18" width="42" height="14" rx="3" fill="#EF4444" fill-opacity="0.12" stroke="#EF4444" stroke-opacity="0.4" stroke-width="0.75"/>
    <text x="37" y="28" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="7" font-weight="700" fill="#EF4444" text-anchor="middle">CACTUS</text>
    <text x="16" y="56" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="15" font-weight="700" fill="#FAFAFA" letter-spacing="-0.02em">Gemma 4</text>
    <text x="16" y="78" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#A3A3A3">context extraction</text>
    <text x="16" y="94" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#A3A3A3">+ stat selection</text>
    <text x="16" y="110" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="8" fill="#525252" letter-spacing="0.1em">CORE ENGINE</text>
  </g>

  <!-- Node: Gemini (complex branch, top) -->
  <g transform="translate(580 60)">
    <rect width="130" height="70" rx="8" fill="#0A0A0A" stroke="#262626" stroke-dasharray="3 3"/>
    <text x="16" y="26" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="-0.01em">Gemini</text>
    <text x="16" y="42" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#A3A3A3">complex queries</text>
    <text x="16" y="58" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="8" fill="#525252" letter-spacing="0.1em">CLOUD FALLBACK</text>
  </g>

  <!-- Node: Sportradar -->
  <g transform="translate(580 270)">
    <rect width="130" height="70" rx="8" fill="#0A0A0A" stroke="#10B981" stroke-opacity="0.3"/>
    <circle cx="24" cy="24" r="6" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-width="0.75"/>
    <path d="M21 24.5l2 2 4-4.5" stroke="#10B981" stroke-width="1.25" fill="none" stroke-linecap="round"/>
    <text x="38" y="28" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="-0.01em">Sportradar</text>
    <text x="16" y="48" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#A3A3A3">verified stat source</text>
    <text x="16" y="62" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="8" fill="#525252" letter-spacing="0.1em">REAL-TIME API</text>
  </g>

  <!-- Node: Visual Dashboard -->
  <g transform="translate(750 120)">
    <rect width="130" height="70" rx="8" fill="#0A0A0A" stroke="#262626"/>
    <rect x="16" y="18" width="24" height="18" rx="2" fill="#141414" stroke="#FAFAFA" stroke-width="0.75"/>
    <text x="46" y="28" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="-0.01em">Dashboard</text>
    <text x="46" y="42" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="8" fill="#A3A3A3">primary surface</text>
    <text x="16" y="62" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="8" fill="#525252" letter-spacing="0.1em">ALWAYS ON</text>
  </g>

  <!-- Node: Voice -->
  <g transform="translate(750 220)">
    <rect width="130" height="70" rx="8" fill="#0A0A0A" stroke="#262626" stroke-dasharray="3 3"/>
    <g transform="translate(16 20)" stroke="#737373" stroke-width="1" fill="none" stroke-linecap="round">
      <rect x="3" y="0" width="8" height="10" rx="4"/>
      <path d="M0 6v1a7 7 0 0 0 14 0V6"/>
    </g>
    <text x="44" y="28" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="-0.01em">Earpiece</text>
    <text x="44" y="42" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="8" fill="#A3A3A3">opt-in only</text>
    <text x="16" y="62" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="8" fill="#525252" letter-spacing="0.1em">ON DEMAND</text>
  </g>

  <!-- Arrows -->
  <g stroke="#525252" stroke-width="1" fill="none" marker-end="url(#arrow)">
    <line class="flow" x1="160" y1="200" x2="196" y2="200"/>
    <line class="flow" x1="330" y1="200" x2="366" y2="200"/>
    <!-- Gemma -> Gemini (complex) -->
    <path class="flow" d="M530 170 Q 560 170 576 130"/>
    <!-- Gemini -> Dashboard -->
    <path d="M710 95 Q 740 95 750 135" stroke-dasharray="3 3"/>
    <!-- Sportradar -> Gemma -->
    <path class="flow" d="M580 290 Q 540 290 530 235"/>
    <!-- Gemma -> Dashboard -->
    <line class="flow" x1="530" y1="180" x2="746" y2="155"/>
    <!-- Gemma -> Voice (opt-in) -->
    <line x1="530" y1="220" x2="746" y2="250" stroke-dasharray="3 3"/>
  </g>

  <!-- Legend -->
  <g transform="translate(30 340)" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9">
    <text fill="#525252" letter-spacing="0.15em">LEGEND</text>
    <g transform="translate(0 18)">
      <line x1="0" y1="6" x2="24" y2="6" stroke="#525252" stroke-width="1"/>
      <text x="32" y="9" fill="#A3A3A3">Primary flow</text>
    </g>
    <g transform="translate(136 18)">
      <line x1="0" y1="6" x2="24" y2="6" stroke="#525252" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="32" y="9" fill="#A3A3A3">Conditional / opt-in</text>
    </g>
    <g transform="translate(320 18)">
      <rect x="0" y="1" width="10" height="10" rx="2" fill="#EF4444" fill-opacity="0.12" stroke="#EF4444" stroke-opacity="0.4"/>
      <text x="18" y="9" fill="#A3A3A3">On-device (Cactus)</text>
    </g>
    <g transform="translate(488 18)">
      <rect x="0" y="1" width="10" height="10" rx="2" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-opacity="0.4"/>
      <text x="18" y="9" fill="#A3A3A3">External API</text>
    </g>
  </g>
</svg>
