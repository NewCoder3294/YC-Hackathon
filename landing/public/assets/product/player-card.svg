<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 180" fill="none">
  <rect width="340" height="180" rx="8" fill="#0A0A0A" stroke="#1F1F1F"/>

  <!-- Avatar circle with initials -->
  <g transform="translate(20 20)">
    <circle cx="28" cy="28" r="28" fill="#141414" stroke="#262626"/>
    <text x="28" y="36" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="18" font-weight="700" fill="#FAFAFA" letter-spacing="-0.02em" text-anchor="middle">PM</text>
    <!-- Jersey number badge -->
    <circle cx="50" cy="50" r="12" fill="#EF4444" stroke="#0A0A0A" stroke-width="2"/>
    <text x="50" y="54" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" font-weight="700" fill="#FAFAFA" text-anchor="middle">15</text>
  </g>

  <!-- Name + position -->
  <g transform="translate(96 30)">
    <text font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.15em">QB • KANSAS CITY</text>
    <text y="22" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="17" font-weight="700" fill="#FAFAFA" letter-spacing="-0.02em">Patrick Mahomes</text>
  </g>

  <!-- Divider -->
  <line x1="20" y1="90" x2="320" y2="90" stroke="#171717"/>

  <!-- Stats grid -->
  <g transform="translate(20 110)" font-family="'IBM Plex Mono', ui-monospace, monospace">
    <g>
      <text font-size="9" fill="#525252" letter-spacing="0.1em">CMP%</text>
      <text y="18" font-size="16" font-weight="700" fill="#FAFAFA">67.2</text>
    </g>
    <g transform="translate(76 0)">
      <text font-size="9" fill="#525252" letter-spacing="0.1em">YDS</text>
      <text y="18" font-size="16" font-weight="700" fill="#FAFAFA">4,183</text>
    </g>
    <g transform="translate(160 0)">
      <text font-size="9" fill="#525252" letter-spacing="0.1em">TD</text>
      <text y="18" font-size="16" font-weight="700" fill="#FAFAFA">27</text>
    </g>
    <g transform="translate(220 0)">
      <text font-size="9" fill="#525252" letter-spacing="0.1em">INT</text>
      <text y="18" font-size="16" font-weight="700" fill="#FAFAFA">6</text>
    </g>
    <g transform="translate(268 0)">
      <text font-size="9" fill="#525252" letter-spacing="0.1em">RTG</text>
      <text y="18" font-size="16" font-weight="700" fill="#10B981">112.4</text>
    </g>
  </g>

  <!-- Source -->
  <g transform="translate(20 158)">
    <circle cx="5" cy="5" r="4.5" fill="#10B981" fill-opacity="0.12" stroke="#10B981" stroke-width="0.75"/>
    <path d="M3 5.25l1.5 1.5 2.75-3" stroke="#10B981" stroke-width="1" fill="none" stroke-linecap="round"/>
    <text x="16" y="9" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.05em">Sportradar • updated 2m ago</text>
  </g>
</svg>
