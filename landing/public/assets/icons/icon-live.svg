<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 24" fill="none">
  <style>
    .pulse { animation: pulse 1.4s ease-in-out infinite; transform-origin: 8px 12px; }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1.0); }
      50%      { opacity: 0.6; transform: scale(2.2); }
    }
  </style>
  <circle class="pulse" cx="8" cy="12" r="4" fill="#EF4444"/>
  <circle cx="8" cy="12" r="4" fill="#EF4444"/>
  <text x="18" y="16" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="0.15em">LIVE</text>
</svg>
