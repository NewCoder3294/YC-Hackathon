<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 24" fill="#FAFAFA">
  <style>
    .bar { transform-origin: center; animation: wave 1.1s ease-in-out infinite; }
    .bar:nth-child(1)  { animation-delay: 0.00s; }
    .bar:nth-child(2)  { animation-delay: 0.08s; }
    .bar:nth-child(3)  { animation-delay: 0.16s; }
    .bar:nth-child(4)  { animation-delay: 0.24s; }
    .bar:nth-child(5)  { animation-delay: 0.32s; }
    .bar:nth-child(6)  { animation-delay: 0.40s; }
    .bar:nth-child(7)  { animation-delay: 0.48s; }
    .bar:nth-child(8)  { animation-delay: 0.56s; }
    .bar:nth-child(9)  { animation-delay: 0.64s; }
    .bar:nth-child(10) { animation-delay: 0.72s; }
    .bar:nth-child(11) { animation-delay: 0.80s; }
    .bar:nth-child(12) { animation-delay: 0.88s; }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.3); }
      50%      { transform: scaleY(1); }
    }
  </style>
  <g>
    <rect class="bar" x="1"  y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="5"  y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="9"  y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="13" y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="17" y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="21" y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="25" y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="29" y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="33" y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="37" y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="41" y="4" width="2" height="16" rx="1"/>
    <rect class="bar" x="45" y="4" width="2" height="16" rx="1"/>
  </g>
</svg>
