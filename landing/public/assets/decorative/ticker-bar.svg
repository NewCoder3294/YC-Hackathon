<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 44" fill="none">
  <style>
    .scroll { animation: scroll 40s linear infinite; }
    @keyframes scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-1200px); }
    }
  </style>

  <!-- Background -->
  <rect width="1200" height="44" fill="#0A0A0A"/>
  <line y1="0" x2="1200" y2="0" stroke="#1F1F1F"/>
  <line y1="43" x2="1200" y2="43" stroke="#1F1F1F"/>

  <!-- LIVE badge fixed left -->
  <g transform="translate(0 0)">
    <rect width="74" height="44" fill="#EF4444"/>
    <circle cx="14" cy="22" r="3" fill="#FAFAFA"/>
    <text x="22" y="26" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="0.15em">LIVE</text>
  </g>

  <!-- Clip region for scrolling content -->
  <defs>
    <clipPath id="ticker-clip">
      <rect x="74" y="0" width="1126" height="44"/>
    </clipPath>
  </defs>

  <g clip-path="url(#ticker-clip)">
    <!-- Two copies of content for seamless loop -->
    <g class="scroll">
      <g transform="translate(94 0)" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="12">
        <text x="0" y="27" fill="#737373" letter-spacing="0.1em">MAHOMES</text>
        <text x="82" y="27" fill="#FAFAFA" font-weight="600">12 TDs, 0 INTs in Dec</text>
        <circle cx="260" cy="22" r="1.5" fill="#404040"/>

        <text x="280" y="27" fill="#737373" letter-spacing="0.1em">SOTO</text>
        <text x="326" y="27" fill="#FAFAFA" font-weight="600">exit velo 108.2mph (top 3%)</text>
        <circle cx="560" cy="22" r="1.5" fill="#404040"/>

        <text x="580" y="27" fill="#737373" letter-spacing="0.1em">KELCE</text>
        <text x="634" y="27" fill="#FAFAFA" font-weight="600">9 rec, 112 yds tonight</text>
        <circle cx="840" cy="22" r="1.5" fill="#404040"/>

        <text x="860" y="27" fill="#737373" letter-spacing="0.1em">ALONSO</text>
        <text x="930" y="27" fill="#FAFAFA" font-weight="600">3 HR from career 200</text>
        <circle cx="1160" cy="22" r="1.5" fill="#404040"/>
      </g>

      <g transform="translate(1294 0)" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="12">
        <text x="0" y="27" fill="#737373" letter-spacing="0.1em">MAHOMES</text>
        <text x="82" y="27" fill="#FAFAFA" font-weight="600">12 TDs, 0 INTs in Dec</text>
        <circle cx="260" cy="22" r="1.5" fill="#404040"/>

        <text x="280" y="27" fill="#737373" letter-spacing="0.1em">SOTO</text>
        <text x="326" y="27" fill="#FAFAFA" font-weight="600">exit velo 108.2mph (top 3%)</text>
        <circle cx="560" cy="22" r="1.5" fill="#404040"/>

        <text x="580" y="27" fill="#737373" letter-spacing="0.1em">KELCE</text>
        <text x="634" y="27" fill="#FAFAFA" font-weight="600">9 rec, 112 yds tonight</text>
        <circle cx="840" cy="22" r="1.5" fill="#404040"/>

        <text x="860" y="27" fill="#737373" letter-spacing="0.1em">ALONSO</text>
        <text x="930" y="27" fill="#FAFAFA" font-weight="600">3 HR from career 200</text>
        <circle cx="1160" cy="22" r="1.5" fill="#404040"/>
      </g>
    </g>
  </g>

  <!-- Right edge fade mask -->
  <defs>
    <linearGradient id="fade-right" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"  stop-color="#0A0A0A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="1120" y="0" width="80" height="44" fill="url(#fade-right)"/>
</svg>
