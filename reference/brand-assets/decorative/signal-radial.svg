<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <style>
    .line-r { 
      stroke-dasharray: 200; 
      stroke-dashoffset: 200;
      animation: draw 3s ease-out infinite;
    }
    .l1 { animation-delay: 0s; }
    .l2 { animation-delay: 0.1s; }
    .l3 { animation-delay: 0.2s; }
    .l4 { animation-delay: 0.3s; }
    .l5 { animation-delay: 0.4s; }
    .l6 { animation-delay: 0.5s; }
    .l7 { animation-delay: 0.6s; }
    .l8 { animation-delay: 0.7s; }
    @keyframes draw {
      0%   { stroke-dashoffset: 200; opacity: 0; }
      20%  { opacity: 1; }
      60%, 100% { stroke-dashoffset: -200; opacity: 0; }
    }
  </style>

  <defs>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="20%">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Center glow -->
  <circle cx="300" cy="200" r="60" fill="url(#center-glow)"/>

  <!-- Origin point -->
  <circle cx="300" cy="200" r="4" fill="#EF4444"/>
  <circle cx="300" cy="200" r="8" fill="none" stroke="#EF4444" stroke-width="1" opacity="0.4"/>

  <!-- Radiating lines -->
  <g stroke="#EF4444" stroke-width="1" stroke-linecap="round">
    <line class="line-r l1" x1="300" y1="200" x2="100" y2="200"/>
    <line class="line-r l2" x1="300" y1="200" x2="500" y2="200"/>
    <line class="line-r l3" x1="300" y1="200" x2="150" y2="80"/>
    <line class="line-r l4" x1="300" y1="200" x2="450" y2="80"/>
    <line class="line-r l5" x1="300" y1="200" x2="150" y2="320"/>
    <line class="line-r l6" x1="300" y1="200" x2="450" y2="320"/>
    <line class="line-r l7" x1="300" y1="200" x2="300" y2="50"/>
    <line class="line-r l8" x1="300" y1="200" x2="300" y2="350"/>
  </g>

  <!-- End node dots -->
  <g fill="#262626">
    <circle cx="100" cy="200" r="2"/>
    <circle cx="500" cy="200" r="2"/>
    <circle cx="150" cy="80"  r="2"/>
    <circle cx="450" cy="80"  r="2"/>
    <circle cx="150" cy="320" r="2"/>
    <circle cx="450" cy="320" r="2"/>
    <circle cx="300" cy="50"  r="2"/>
    <circle cx="300" cy="350" r="2"/>
  </g>
</svg>
