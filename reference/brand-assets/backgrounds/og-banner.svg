<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="og-glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="og-accent" cx="80%" cy="20%" r="40%">
      <stop offset="0%"  stop-color="#EF4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
    <pattern id="og-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1A" stroke-width="0.75"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#og-glow)"/>
  <rect width="1200" height="630" fill="url(#og-grid)"/>
  <rect width="1200" height="630" fill="url(#og-accent)"/>

  <!-- Mark -->
  <g transform="translate(80 80)">
    <rect width="80" height="80" rx="14" fill="#0A0A0A"/>
    <rect x="0.5" y="0.5" width="79" height="79" rx="13.5" stroke="#2A2A2A"/>
    <g transform="translate(20 20)">
      <rect x="0"  y="0"  width="4" height="40" fill="#FAFAFA"/>
      <rect x="9"  y="5"  width="4" height="12" fill="#FAFAFA"/>
      <rect x="18" y="2"  width="4" height="18" fill="#FAFAFA"/>
      <rect x="27" y="7"  width="4" height="8"  fill="#EF4444"/>
      <rect x="36" y="3"  width="4" height="15" fill="#FAFAFA"/>
      <rect x="9"  y="22" width="4" height="12" fill="#FAFAFA"/>
      <rect x="18" y="20" width="4" height="18" fill="#FAFAFA"/>
      <rect x="27" y="25" width="4" height="8"  fill="#FAFAFA"/>
      <rect x="36" y="22" width="4" height="15" fill="#FAFAFA"/>
    </g>
  </g>

  <!-- Live chip -->
  <g transform="translate(80 210)">
    <rect width="180" height="32" rx="16" fill="#171717" stroke="#262626"/>
    <circle cx="18" cy="16" r="4" fill="#EF4444"/>
    <text x="32" y="21" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="0.15em">LIVE • &lt;200MS</text>
  </g>

  <!-- Headline -->
  <text x="80" y="330" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="72" font-weight="700" fill="#FAFAFA" letter-spacing="-0.03em">BroadcastBrain</text>
  <text x="80" y="400" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="32" font-weight="400" fill="#A3A3A3" letter-spacing="-0.01em">The spotter that never sleeps.</text>
  <text x="80" y="445" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="32" font-weight="400" fill="#A3A3A3" letter-spacing="-0.01em">Right stat. Right moment. Under 200ms.</text>

  <!-- Footer -->
  <line x1="80" y1="530" x2="1120" y2="530" stroke="#262626"/>
  <text x="80" y="570" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="14" fill="#737373" letter-spacing="0.1em">YC VOICE AGENTS HACKATHON 2026</text>
  <text x="1120" y="570" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="14" fill="#737373" letter-spacing="0.1em" text-anchor="end">CACTUS × GEMMA 4</text>
</svg>
