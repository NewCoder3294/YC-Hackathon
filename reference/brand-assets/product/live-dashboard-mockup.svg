<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" fill="none">
  <style>
    .pulse-r { animation: pr 1.4s ease-in-out infinite; }
    @keyframes pr { 0%,100%{opacity:0.4}50%{opacity:1} }
    .msg { opacity: 0; animation: msgIn 0.5s ease-out forwards; }
    .m1 { animation-delay: 0.2s; }
    .m2 { animation-delay: 0.6s; }
    .m3 { animation-delay: 1.0s; }
    @keyframes msgIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
  </style>

  <rect width="1000" height="600" rx="10" fill="#0A0A0A" stroke="#262626"/>

  <!-- Top bar -->
  <g transform="translate(0 0)">
    <rect width="1000" height="48" fill="#080808"/>
    <line y1="48" x2="1000" y2="48" stroke="#1F1F1F"/>
    <g transform="translate(20 18)">
      <circle cx="4"  cy="4" r="4" fill="#262626"/>
      <circle cx="18" cy="4" r="4" fill="#262626"/>
      <circle cx="32" cy="4" r="4" fill="#262626"/>
    </g>
    <text x="500" y="28" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" letter-spacing="0.15em" text-anchor="middle">BROADCASTBRAIN • PRODUCER DASHBOARD</text>

    <!-- Status chips -->
    <g transform="translate(720 14)">
      <rect width="88" height="20" rx="3" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.3"/>
      <circle cx="10" cy="10" r="3" fill="#10B981"/>
      <text x="20" y="13" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#10B981" letter-spacing="0.1em">OBS LIVE</text>
    </g>
    <g transform="translate(816 14)">
      <rect width="88" height="20" rx="3" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.3"/>
      <circle cx="10" cy="10" r="3" fill="#10B981"/>
      <text x="20" y="13" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#10B981" letter-spacing="0.1em">SPORTRADAR</text>
    </g>
    <text x="970" y="28" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="10" fill="#737373" text-anchor="end" letter-spacing="0.05em">Q3 • 8:42</text>
  </g>

  <!-- Three panes -->
  <!-- Pane 1: LIVE WHISPER -->
  <g transform="translate(20 68)">
    <rect width="320" height="420" rx="6" fill="#080808" stroke="#1F1F1F"/>
    <g transform="translate(16 16)">
      <circle class="pulse-r" cx="3" cy="4" r="3" fill="#EF4444"/>
      <text x="12" y="8" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="10" font-weight="700" fill="#A3A3A3" letter-spacing="0.15em">LIVE WHISPER</text>
    </g>
    <line x1="16" y1="38" x2="304" y2="38" stroke="#1A1A1A"/>

    <!-- Whisper entries -->
    <g class="msg m1" transform="translate(16 52)">
      <rect width="288" height="62" rx="4" fill="#0F0F0F" stroke="#1F1F1F"/>
      <text x="12" y="18" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.1em">00:08 • 94ms</text>
      <text x="12" y="38" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" fill="#FAFAFA">"third TD, that's him"</text>
      <text x="12" y="54" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#10B981">→ 12 TDs, 0 INTs Dec</text>
    </g>

    <g class="msg m2" transform="translate(16 124)">
      <rect width="288" height="62" rx="4" fill="#0F0F0F" stroke="#1F1F1F"/>
      <text x="12" y="18" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.1em">00:41 • 118ms</text>
      <text x="12" y="38" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" fill="#FAFAFA">"Kelce with the catch..."</text>
      <text x="12" y="54" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#10B981">→ 9 rec, 112 yds tonight</text>
    </g>

    <g class="msg m3" transform="translate(16 196)">
      <rect width="288" height="62" rx="4" fill="#0F0F0F" stroke="#EF4444" stroke-opacity="0.3"/>
      <text x="12" y="18" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.1em">01:12 • 162ms</text>
      <text x="12" y="38" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" fill="#FAFAFA">"fourth-quarter comeback..."</text>
      <text x="12" y="54" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#F59E0B">→ COMPLEX • routed to Gemini</text>
    </g>
  </g>

  <!-- Pane 2: CLIP FLAGS -->
  <g transform="translate(356 68)">
    <rect width="320" height="420" rx="6" fill="#080808" stroke="#1F1F1F"/>
    <g transform="translate(16 16)">
      <path d="M0 0v14h10l-2-3 2-4H0z" fill="#F59E0B"/>
      <text x="16" y="11" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="10" font-weight="700" fill="#A3A3A3" letter-spacing="0.15em">CLIP FLAGS</text>
    </g>
    <line x1="16" y1="38" x2="304" y2="38" stroke="#1A1A1A"/>

    <!-- Flag 1 -->
    <g transform="translate(16 52)">
      <rect width="288" height="110" rx="4" fill="#0F0F0F" stroke="#EF4444" stroke-opacity="0.4"/>
      <!-- Score meter -->
      <rect x="12" y="14" width="264" height="4" rx="2" fill="#1A1A1A"/>
      <rect x="12" y="14" width="224" height="4" rx="2" fill="#EF4444"/>
      <text x="12" y="36" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#737373" letter-spacing="0.1em">VIRAL SCORE</text>
      <text x="276" y="36" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="10" font-weight="700" fill="#EF4444" text-anchor="end">85</text>
      <text x="12" y="58" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA">Q3 • 8:42 — Mahomes TD</text>
      <text x="12" y="76" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#A3A3A3">crowd +20db • 12/0 record milestone</text>
      <g transform="translate(12 86)">
        <rect width="66" height="16" rx="3" fill="#141414" stroke="#262626"/>
        <text x="33" y="11" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#A3A3A3" text-anchor="middle">PREVIEW</text>
      </g>
      <g transform="translate(82 86)">
        <rect width="66" height="16" rx="3" fill="#EF4444"/>
        <text x="33" y="11" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" font-weight="700" fill="#0A0A0A" text-anchor="middle">CLIP ▶</text>
      </g>
    </g>

    <!-- Flag 2 -->
    <g transform="translate(16 174)">
      <rect width="288" height="90" rx="4" fill="#0F0F0F" stroke="#1F1F1F"/>
      <rect x="12" y="14" width="264" height="4" rx="2" fill="#1A1A1A"/>
      <rect x="12" y="14" width="150" height="4" rx="2" fill="#F59E0B"/>
      <text x="12" y="36" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#737373" letter-spacing="0.1em">VIRAL SCORE</text>
      <text x="276" y="36" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="10" font-weight="700" fill="#F59E0B" text-anchor="end">57</text>
      <text x="12" y="58" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA">Q3 • 3:12 — Kelce catch</text>
      <text x="12" y="76" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#A3A3A3">3rd-down conversion • no milestone</text>
    </g>
  </g>

  <!-- Pane 3: REPLAY QUEUE -->
  <g transform="translate(692 68)">
    <rect width="288" height="420" rx="6" fill="#080808" stroke="#1F1F1F"/>
    <g transform="translate(16 16)">
      <g fill="none" stroke="#A3A3A3" stroke-width="1.25" stroke-linecap="round">
        <path d="M1 6a5 5 0 1 0 2-4"/>
        <path d="M1 1v3h3"/>
      </g>
      <text x="16" y="11" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="10" font-weight="700" fill="#A3A3A3" letter-spacing="0.15em">REPLAY QUEUE</text>
    </g>
    <line x1="16" y1="38" x2="272" y2="38" stroke="#1A1A1A"/>

    <g transform="translate(16 52)">
      <rect width="256" height="60" rx="4" fill="#0F0F0F" stroke="#1F1F1F"/>
      <text x="12" y="18" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.1em">PRIMARY</text>
      <text x="12" y="36" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" fill="#FAFAFA">QB release</text>
      <text x="12" y="52" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#737373">cam-4 • end zone</text>
    </g>

    <g transform="translate(16 122)">
      <rect width="256" height="60" rx="4" fill="#0F0F0F" stroke="#1F1F1F"/>
      <text x="12" y="18" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.1em">SECONDARY</text>
      <text x="12" y="36" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" fill="#FAFAFA">Receiver catch + defender</text>
      <text x="12" y="52" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#737373">cam-1 • sideline</text>
    </g>

    <g transform="translate(16 192)">
      <rect width="256" height="60" rx="4" fill="#0F0F0F" stroke="#1F1F1F"/>
      <text x="12" y="18" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.1em">TERTIARY</text>
      <text x="12" y="36" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" fill="#FAFAFA">Crowd reaction</text>
      <text x="12" y="52" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#737373">cam-3 • wide</text>
    </g>
  </g>

  <!-- Bottom overlay indicator -->
  <g transform="translate(20 508)">
    <rect width="960" height="72" rx="6" fill="#080808" stroke="#1F1F1F"/>
    <g transform="translate(16 14)">
      <rect width="70" height="18" rx="3" fill="#10B981" fill-opacity="0.1" stroke="#10B981" stroke-opacity="0.4"/>
      <text x="35" y="12" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" font-weight="700" fill="#10B981" letter-spacing="0.1em" text-anchor="middle">ACTIVE</text>
    </g>
    <text x="98" y="26" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.15em">GRAPHICS OVERLAY</text>
    <text x="98" y="50" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="15" font-weight="600" fill="#FAFAFA">12 TDs, 0 INTs in December</text>
    <text x="944" y="30" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.1em" text-anchor="end">DURATION</text>
    <text x="944" y="50" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="14" font-weight="700" fill="#FAFAFA" text-anchor="end">6.0s</text>
  </g>
</svg>
