<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 720" fill="none">
  <!-- Tablet body -->
  <rect x="10" y="10" width="500" height="700" rx="32" fill="#141414" stroke="#262626" stroke-width="1.5"/>
  <rect x="20" y="20" width="480" height="680" rx="24" fill="#050505"/>

  <!-- Front camera dot -->
  <circle cx="260" cy="36" r="3" fill="#0A0A0A" stroke="#262626"/>

  <!-- Screen content -->
  <g transform="translate(30 52)">
    <!-- Status bar -->
    <g>
      <text x="12" y="12" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#A3A3A3" letter-spacing="0.1em">19:47</text>
      <g transform="translate(440 4)">
        <!-- Signal bars -->
        <rect x="0"  y="6" width="2" height="2" rx="0.5" fill="#A3A3A3"/>
        <rect x="4"  y="4" width="2" height="4" rx="0.5" fill="#A3A3A3"/>
        <rect x="8"  y="2" width="2" height="6" rx="0.5" fill="#A3A3A3"/>
        <rect x="12" y="0" width="2" height="8" rx="0.5" fill="#A3A3A3"/>
        <!-- Battery -->
        <rect x="20" y="1" width="20" height="7" rx="1.5" fill="none" stroke="#A3A3A3" stroke-width="0.5"/>
        <rect x="22" y="3" width="14" height="3" fill="#A3A3A3"/>
      </g>
    </g>

    <!-- App header -->
    <g transform="translate(0 32)">
      <text font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#525252" letter-spacing="0.15em">SPOTTING BOARD</text>
      <text y="22" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="16" font-weight="700" fill="#FAFAFA" letter-spacing="-0.02em">Mets @ Braves</text>
      <text y="42" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#737373">Truist Park • 13:10 EST</text>

      <!-- Live chip -->
      <g transform="translate(368 0)">
        <rect width="72" height="22" rx="3" fill="#EF4444" fill-opacity="0.1" stroke="#EF4444" stroke-opacity="0.4"/>
        <circle cx="12" cy="11" r="3" fill="#EF4444"/>
        <text x="22" y="15" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" font-weight="700" fill="#EF4444" letter-spacing="0.1em">T7 • 2</text>
      </g>
    </g>

    <!-- AT BAT highlighted card -->
    <g transform="translate(0 100)">
      <rect width="420" height="100" rx="6" fill="#0F0F0F" stroke="#EF4444" stroke-opacity="0.3"/>
      <text x="14" y="20" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" fill="#EF4444" letter-spacing="0.15em">AT BAT</text>
      <g transform="translate(14 28)">
        <circle cx="18" cy="18" r="18" fill="#141414" stroke="#262626"/>
        <text x="18" y="23" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="700" fill="#FAFAFA" text-anchor="middle">JS</text>
      </g>
      <text x="62" y="48" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="13" font-weight="700" fill="#FAFAFA">Juan Soto • RF</text>
      <text x="62" y="64" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="10" fill="#A3A3A3">Exit velo 108.2 mph tonight (top 3%)</text>
      <g transform="translate(14 78)">
        <path d="M6 0L0 8h3l-1 5 6-8H5l1-5z" fill="#F59E0B" stroke="#F59E0B" stroke-linejoin="round"/>
        <text x="14" y="10" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="8" fill="#F59E0B" letter-spacing="0.1em">ESOTERIC • 12-game OBS streak</text>
      </g>
    </g>

    <!-- Roster list -->
    <g transform="translate(0 220)" font-family="'IBM Plex Mono', ui-monospace, monospace">
      <text y="0" font-size="9" fill="#525252" letter-spacing="0.15em">ON DECK</text>

      <g transform="translate(0 14)">
        <rect width="420" height="52" rx="5" fill="#0F0F0F" stroke="#1F1F1F"/>
        <circle cx="24" cy="26" r="14" fill="#141414" stroke="#262626"/>
        <text x="24" y="30" font-size="9" font-weight="700" fill="#FAFAFA" text-anchor="middle">PA</text>
        <text x="48" y="22" font-size="11" font-weight="600" fill="#FAFAFA">Pete Alonso • 1B</text>
        <text x="48" y="36" font-size="9" fill="#A3A3A3">.278 • 34 HR • 3 from career 200</text>
        <text x="410" y="30" font-size="10" font-weight="700" fill="#10B981" text-anchor="end">#20</text>
      </g>

      <g transform="translate(0 74)">
        <rect width="420" height="52" rx="5" fill="#0F0F0F" stroke="#1F1F1F"/>
        <circle cx="24" cy="26" r="14" fill="#141414" stroke="#262626"/>
        <text x="24" y="30" font-size="9" font-weight="700" fill="#FAFAFA" text-anchor="middle">FL</text>
        <text x="48" y="22" font-size="11" font-weight="600" fill="#FAFAFA">Francisco Lindor • SS</text>
        <text x="48" y="36" font-size="9" fill="#A3A3A3">.291 • .340 vs LHP • 18 SB</text>
        <text x="410" y="30" font-size="10" font-weight="700" fill="#737373" text-anchor="end">#12</text>
      </g>

      <g transform="translate(0 134)">
        <rect width="420" height="52" rx="5" fill="#0F0F0F" stroke="#1F1F1F"/>
        <circle cx="24" cy="26" r="14" fill="#141414" stroke="#262626"/>
        <text x="24" y="30" font-size="9" font-weight="700" fill="#FAFAFA" text-anchor="middle">MV</text>
        <text x="48" y="22" font-size="11" font-weight="600" fill="#FAFAFA">Mark Vientos • 3B</text>
        <text x="48" y="36" font-size="9" fill="#A3A3A3">.265 • 16 HR in 58 gm • father at game</text>
        <text x="410" y="30" font-size="10" font-weight="700" fill="#737373" text-anchor="end">#27</text>
      </g>

      <g transform="translate(0 194)">
        <rect width="420" height="52" rx="5" fill="#0F0F0F" stroke="#1F1F1F"/>
        <circle cx="24" cy="26" r="14" fill="#141414" stroke="#262626"/>
        <text x="24" y="30" font-size="9" font-weight="700" fill="#FAFAFA" text-anchor="middle">FA</text>
        <text x="48" y="22" font-size="11" font-weight="600" fill="#FAFAFA">Francisco Alvarez • C</text>
        <text x="48" y="36" font-size="9" fill="#A3A3A3">25 CS% • .245 AVG vs Braves</text>
        <text x="410" y="30" font-size="10" font-weight="700" fill="#737373" text-anchor="end">#04</text>
      </g>

      <g transform="translate(0 254)">
        <rect width="420" height="52" rx="5" fill="#0F0F0F" stroke="#1F1F1F"/>
        <circle cx="24" cy="26" r="14" fill="#141414" stroke="#262626"/>
        <text x="24" y="30" font-size="9" font-weight="700" fill="#FAFAFA" text-anchor="middle">BN</text>
        <text x="48" y="22" font-size="11" font-weight="600" fill="#FAFAFA">Brandon Nimmo • CF</text>
        <text x="48" y="36" font-size="9" fill="#A3A3A3">.269 • 14 HR • 8-gm hit streak</text>
        <text x="410" y="30" font-size="10" font-weight="700" fill="#737373" text-anchor="end">#09</text>
      </g>
    </g>

    <!-- Bottom voice query bar -->
    <g transform="translate(0 550)">
      <rect width="420" height="56" rx="28" fill="#0F0F0F" stroke="#1F1F1F"/>
      <g transform="translate(20 20)" stroke="#737373" stroke-width="1.25" fill="none" stroke-linecap="round">
        <rect x="3" y="0" width="8" height="12" rx="4"/>
        <path d="M0 8v1a7 7 0 0 0 14 0V8"/>
        <path d="M7 16v3"/>
      </g>
      <text x="44" y="34" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" fill="#737373" letter-spacing="0.05em">Hold to ask BroadcastBrain…</text>
      <g transform="translate(370 12)">
        <rect width="38" height="32" rx="16" fill="#EF4444"/>
        <circle cx="19" cy="16" r="5" fill="#FAFAFA"/>
      </g>
    </g>
  </g>
</svg>
